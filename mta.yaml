_schema-version: 3.3.0
ID: salesorder
description: A simple CAP project.
version: 1.0.0
modules:
  - name: salesorder-srv
    type: nodejs
    path: gen/srv
    requires:
      - name: salesorder-db
      - name: salesorder-destination
      - name: uaa_salesorder
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}
    parameters:
      buildpack: nodejs_buildpack
      instances: 1
    build-parameters:
      builder: npm-ci
  - name: salesorder-db-deployer
    type: hdb
    path: gen/db
    requires:
      - name: salesorder-db
    parameters:
      buildpack: nodejs_buildpack
  - name: salesorder-destination-content
    type: com.sap.application.content
    requires:
      - name: salesorder-destination
        parameters:
          content-target: true
      - name: salesorder_html_repo_host
        parameters:
          service-key:
            name: salesorder_html_repo_host-key
      - name: uaa_salesorder
        parameters:
          service-key:
            name: uaa_salesorder-key
    parameters:
      content:
        instance:
          destinations:
            - Name: ust_salesorder_salesorder_html_repo_host
              ServiceInstanceName: salesorder-html5-app-host-service
              ServiceKeyName: salesorder_html_repo_host-key
              sap.cloud.service: ust.salesorder
            - Authentication: OAuth2UserTokenExchange
              Name: ust_salesorder_uaa_salesorder
              ServiceInstanceName: salesorder-xsuaa-service
              ServiceKeyName: uaa_salesorder-key
              sap.cloud.service: ust.salesorder
          existing_destinations_policy: ignore
    build-parameters:
      no-source: true
  - name: salesorder-app-content
    type: com.sap.application.content
    path: .
    requires:
      - name: salesorder_html_repo_host
        parameters:
          content-target: true
    build-parameters:
      build-result: resources
      requires:
        - artifacts:
            - ustsosoreq.zip
          name: ustsosoreq
          target-path: resources/
  - name: ustsosoreq
    type: html5
    path: app/soreq
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm install
        - npm run build:cf
      supported-platforms:
        []
resources:
  - name: salesorder-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared
  - name: salesorder-destination
    type: org.cloudfoundry.managed-service
    parameters:
      config:
        HTML5Runtime_enabled: true
        init_data:
          instance:
            destinations:
              - Authentication: NoAuthentication
                Name: ui5
                ProxyType: Internet
                Type: HTTP
                URL: https://ui5.sap.com
              - Authentication: NoAuthentication
                HTML5.DynamicDestination: true
                HTML5.ForwardAuthToken: true
                Name: srv-api
                ProxyType: Internet
                Type: HTTP
                URL: ~{srv-api/srv-url}
            existing_destinations_policy: update
      service: destination
      service-plan: lite
    requires:
      - name: srv-api
  - name: salesorder_html_repo_host
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-name: salesorder-html5-app-host-service
      service-plan: app-host
  - name: uaa_salesorder
    type: org.cloudfoundry.managed-service
    parameters:
      config:
        oauth2-configuration:
          credential-types:
            - binding-secret
            - x509
        tenant-mode: dedicated
        xsappname: salesorder-${org}-${space}
      path: ./xs-security.json
      service: xsuaa
      service-name: salesorder-xsuaa-service
      service-plan: application
parameters:
  deploy_mode: html5-repo
  enable-parallel-deployments: true
build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci
        - npx cds build --production
